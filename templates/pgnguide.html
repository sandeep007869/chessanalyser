<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGN-GUIDE</title>
    <style>
        body{
            background-image: url("{{ url_for('static', filename='pieces/chessbackground.jpg') }}");
            background-size: 100vw 100vh;
            background-position: top;
            background-repeat: no-repeat;
        }

      
        nav{
            width: 100%;
            margin-left: 0; 
            height: 8vh;          
        }
         ul{ 
            list-style-type: none;
            margin: 0;
            padding: 0;
            height: 8vh;
            overflow: hidden;
           background-color: black; 
        }
        li{ 
            float: right;
            padding: 8px;
            margin-top: 2vh;
            margin-right: 3%;
            min-height: 1vw;
            max-height: 3vw;
            border-radius: 12px;
            text-align: center;  
        } 
        li a{
            text-decoration: none;
            color: white;
            font-size: 1vw;
            font-family: Arial, Helvetica, sans-serif;
        }
        li:hover{
            background-color:rgba(255, 255, 255, 0.5);
        }
        li:hover a{
            color:black;
        }
        .sitename{
            float: left;
            display: flex;
            align-items: center;
            padding-top: 0vh;
            padding-bottom: 0.5vh;
            padding-left: 2vw;
            padding-right: 2vw;
            color: white;
            font-size: 1.2vw;
            margin-top: 1.5vh;
        }
        .sitename:hover{
            background-color:black;
            color:white;
        }
        .sitelogo{
            width: 2.8vw;
            height: 2.8vw;
            margin-right: 1vw;
            border-radius: 1vh;
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            height:80vh;
            width: 95%;
            border: 0.1vw solid black;
            margin-left: 2vw;
            margin-right: 2vw;
            margin-top: 4vh;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 2vw;
        }
        .chesscom{
            width: 40vh;
            height: 40vh;
            border: 4px solid black;
            float:left;
            border-radius: 2vw;
        }
        .lichess{
            width: 40vh;
            height: 40vh;
            border: 4px solid black;
            float : right;
            border-radius: 2vw;
            margin-left: 5vw;
        }
        .chesslogo{ 
            width:8vw;
            height:8vw;
            border-radius:2vw ; 
            object-fit: contain;
            margin:2vw 7vw;
        }
        .lichesslogo{ 
            width:8vw;
            height:8vw;
            border-radius:2vw ; 
            object-fit: contain;
            margin:2vw 7vw;
        }
        h1{
            font-size: 1.5vw;
            text-align: center;
            margin-top: 2vh;
        }
        button{
            height: 5vh;
            width: 20vw;
            background-color: black;
            margin-left: .9vw;
            border-radius:2vw;
        }
        a button{
            text-decoration: none;
            color: white;
            font-size: 1.2vw;
        }
        button:hover{
            background-color: lightgray;
            transform: scale(1.05);
        }
        a:hover button{
            color:black;
        }
        body {
        opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s ease forwards;
         }

        @keyframes fadeIn {
            to {
            opacity: 1;
            transform: translateY(0);
            }
        }

    </style>
</head>
<body>
    <nav>
   
    <ul>
        <li><a href="{{url_for('contact') }}">ABOUT</a></li>
        <li><a href="{{url_for('rules') }}">RULES</a></li>
        <li><a href="{{url_for('pgnguide') }}">PGN-GUIDE</a></li>
        <li><a href="{{url_for('homepage') }}">HOME</a></li>
        <li class="sitename"><img class="sitelogo" src="{{ url_for('static', filename='pieces/cheslogoc.png') }}" ><h2>CHESS GAME ANALYZER</h2></li>    

    </ul>
</nav>
    <div class="container">
        <div class="chesscom">
            <a href=""  ><img class="chesslogo" src="{{ url_for('static', filename='pieces/chesscomlogo.png') }}" ></a>
            <h1>How to download pgn from chess.com full steps and guide</h1>
            <a href="{{url_for('chessp')}}"><button>Chess.com</button></a>
        </div>
        <div class="lichess">
            <a href="" ><img class="lichesslogo" src="{{ url_for('static', filename='pieces/lichesscomlogo.png') }}" ></a>
            <h1>How to download pgn from lichess.org full steps and guide</h1>
           <a href="{{url_for('lichessp')}}"><button>lichess.org </button> </a>
        </div>
