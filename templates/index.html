<!DOCTYPE html>
<html>
<head>
    
    <title>Chess Analyzer</title>
    <style>
        body{
            font-family: Arial;
            padding: 20px;
        }
        button{
            border: none;
            border-radius: 8px;
            background:rgb(98, 36, 0);
            color: white;
            padding: 8px 14px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.1s;
        }
        button:hover{
            background: #a05e01;
            transform: scale(1.05);
        }
        input[type="file"]{

        h3{
            color:rgb(98, 36, 0);

            margin: auto;
        }
        .cont{
            width :80vh ;
            display: flex;
            max-width: 550px;
            aspect-ratio: 1/1;   
            padding: 2.5vw; 
        }
      .formcontainer{
            align-items: right;
            position: absolute;
            display: flex;
            margin-left: 1vw;
            margin-right: 2vw;
            background-color: blanchedalmond;
            background-color: rgba(255, 255, 255, 0.8);
            border-color:rgb(98, 36, 0);
            border-style: solid ;
            border-width: 0.1vw;
            border-radius: 1.5vw;            
        } 
        body{
            background-image: url("{{ url_for('static', filename='pieces/chessbackground.jpg') }}");
            background-size: cover;
            background-position: top;
            background-repeat: no-repeat;
        }

<body class="body">
    <h3><b>UPLOAD PGN FILE</b></h3>
        <div class="formcontainer">
            <div class = "cont">
                <img src="static\pieces\chessboardss.png" alt="Chess Image" img style="width:100%; height:100%; object-fit:cover;">
            </div> 
        <form style="margin-left: 3vw; margin-top: 3.5vw;"  action="/upload" method="post" name="file" enctype="multipart/form-data" >
